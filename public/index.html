<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ライン職 — プロトタイプ</title>
  <!-- 古代碑文風の表示フォント（オフライン時は serif にフォールバック） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- ロビー（モード選択） -->
  <div id="lobby" class="screen">
    <div class="lobby-card">
      <h1 class="lobby-title">ライン職</h1>
      <p class="lobby-sub">古代遺跡テーマのカードバトル</p>
      <button id="btn-cpu" class="btn primary big">CPU と対戦</button>
      <div class="online-box">
        <div class="online-head">オンライン対戦</div>
        <div class="online-grid">
          <button id="btn-create" class="btn big">部屋を作る</button>
          <button id="btn-quick" class="btn big">クイックマッチ</button>
        </div>
        <div class="join-row">
          <input id="join-code" maxlength="4" placeholder="合言葉" autocomplete="off" />
          <button id="btn-join" class="btn">コードで参加</button>
        </div>
      </div>
      <div id="lobby-error" class="error"></div>
    </div>
  </div>

  <!-- 待機（部屋作成 / クイックマッチ） -->
  <div id="waiting" class="screen hidden">
    <div class="lobby-card">
      <div id="waiting-msg" class="waiting-msg"></div>
      <div class="spinner"></div>
      <div id="waiting-code" class="waiting-code"></div>
      <div id="waiting-share"></div>
      <button id="waiting-cancel" class="btn">キャンセル</button>
    </div>
  </div>

  <!-- ゲーム本体 -->
  <div id="app" class="hidden">
    <header id="topbar">
      <h1>ライン職 <span class="sub">— プロトタイプ（コア最小）</span></h1>
      <div id="turn-indicator"></div>
      <button id="new-game" class="btn">新しい対戦</button>
    </header>

    <!-- 相手（奥） -->
    <section class="side foe">
      <div class="leader" id="foe-leader"></div>
      <div class="board" id="foe-board" data-side="foe"></div>
      <div class="pile" id="foe-pile"></div>
    </section>

    <!-- 中央：ログ -->
    <div id="log" aria-label="ログ"></div>

    <!-- 自分（手前） -->
    <section class="side me">
      <div class="leader" id="me-leader"></div>
      <div class="board" id="me-board" data-side="me"></div>
      <div class="pile" id="me-pile"></div>
    </section>

    <!-- 手札・操作 -->
    <footer id="controls">
      <div id="hand"></div>
      <button id="end-turn" class="btn primary">ターン終了</button>
    </footer>
  </div>

  <!-- ゲーム終了オーバーレイ -->
  <div id="overlay" class="hidden">
    <div class="overlay-card">
      <div id="overlay-msg"></div>
      <div class="overlay-btns">
        <button id="overlay-again" class="btn primary">もう一度</button>
        <button id="overlay-lobby" class="btn hidden">ロビーへ</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
